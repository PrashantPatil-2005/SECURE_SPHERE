name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/api/requirements.txt
          pip install -r tests/requirements.txt
          pip install ruff bandit pip-audit pyyaml==6.0.1

      - name: Phase 13 unit tests (pure-Python modules)
        run: pytest tests/test_phase13_unit.py -q

      - name: Compile-check every backend .py + cli
        run: |
          python -m compileall -q backend
          python -m compileall -q cli

      - name: Lint (ruff)
        run: ruff check backend/ attacker/ scripts/ tests/ || true

      - name: Security scan (bandit)
        run: bandit -r backend/ attacker/ -ll -ii || true

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r backend/api/requirements.txt --strict || true

      - name: Smoke import
        env:
          JWT_SECRET: ci-test-secret-at-least-16-chars
          POSTGRES_PASSWORD: ci-test
          FLASK_ENV: development
          CORS_ORIGINS: "*"
        run: |
          cd backend/api
          python -c "import app; print('import OK')"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Audit
        working-directory: frontend
        run: npm audit --audit-level=high || true

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [lint-and-unit, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          cat > .env <<EOF
          POSTGRES_PASSWORD=ci_pass
          POSTGRES_USER=securisphere_user
          POSTGRES_DB=securisphere_db
          POSTGRES_HOST=database
          POSTGRES_PORT=5432
          REDIS_HOST=redis
          REDIS_PORT=6379
          JWT_SECRET=ci-test-secret-at-least-32-chars-long-xx
          CORS_ORIGINS=http://localhost:3000,http://localhost:4000
          FLASK_ENV=development
          ALLOW_LOCALHOST_UPSTREAM=0
          FRONTEND_PORT=3000
          EOF

      - name: Build all containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/health; then
              echo "backend healthy"; exit 0
            fi
            sleep 5
          done
          echo "backend never became healthy"
          docker compose logs backend
          exit 1

      - name: Smoke test — Topology Collector
        run: curl -fsS http://localhost:5080/health || true

      - name: Tear down
        if: always()
        run: docker compose down -v
