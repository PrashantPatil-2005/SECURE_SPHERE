worker_processes auto;
error_log /var/log/waf/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 ipv6=off valid=30s;
    sendfile on;
    keepalive_timeout 65;
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    # Shared dicts for WAF state
    lua_shared_dict waf_config 1m;
    lua_shared_dict waf_stats 2m;
    lua_shared_dict waf_ratelimit 10m;

    # Preload WAF modules on worker init
    init_by_lua_block {
        require("cjson")
    }
    init_worker_by_lua_block {
        local ok, err = pcall(function()
            require("waf_config").load()
        end)
        if not ok then ngx.log(ngx.ERR, "waf_config load failed: ", err) end
    }

    log_format waf_json escape=json
        '{"ts":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
        '"uri":"$request_uri","status":$status,"ua":"$http_user_agent",'
        '"referer":"$http_referer","host":"$host","blocked":"$waf_blocked",'
        '"rule":"$waf_rule","upstream":"$proxy_host"}';

    access_log /var/log/waf/access.log waf_json;

    # ─── Shared upstream proxy pipeline (reused by HTTP + HTTPS servers) ───
    # Implemented via named location + include directives.

    # Admin endpoint (no external port publish; reachable only over
    # internal docker network from backend container)
    server {
        listen 8081;

        location = /waf/stats {
            content_by_lua_block {
                local cjson = require("cjson")
                local s = ngx.shared.waf_stats
                local c = ngx.shared.waf_config
                ngx.header.content_type = "application/json"
                ngx.say(cjson.encode({
                    requests = s:get("requests") or 0,
                    blocked  = s:get("blocked")  or 0,
                    sqli     = s:get("sqli")     or 0,
                    xss      = s:get("xss")      or 0,
                    traversal= s:get("traversal")or 0,
                    ratelimit= s:get("ratelimit")or 0,
                    upstream = (c:get("upstream")) or "",
                    enabled  = (c:get("enabled") == 1),
                    rpm      = (c:get("rpm")) or 600,
                    tls      = (c:get("tls_enabled") == 1),
                    captcha  = (c:get("captcha_enabled") == 1),
                    geo      = (c:get("geo_enabled") == 1),
                }))
            }
        }

        location = /waf/reload {
            content_by_lua_block {
                require("waf_config").load()
                ngx.say("reloaded")
            }
        }
    }

    # ─── Public HTTP proxy (port 8080) ────────────────────────────────────
    server {
        listen 8080 default_server;
        server_name _;

        set $waf_blocked "0";
        set $waf_rule    "-";

        client_max_body_size 2m;

        access_by_lua_file /usr/local/openresty/nginx/lua/waf.lua;
        log_by_lua_file    /usr/local/openresty/nginx/lua/logger.lua;

        location / {
            set_by_lua_block $upstream_target {
                return ngx.shared.waf_config:get("upstream") or ""
            }

            if ($upstream_target = "") {
                return 503;
            }

            proxy_pass $upstream_target;
            proxy_http_version 1.1;
            proxy_set_header Host              $proxy_host;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-WAF-Protected   "securisphere";
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;
        }

        error_page 503 = @notconfigured;
        location @notconfigured {
            default_type text/html;
            return 503 '<html><body style="font-family:monospace;background:#0a0a0a;color:#eab308;padding:40px"><h2>SecuriSphere WAF</h2><p>No upstream configured. Visit /system in the SOC dashboard to set Protected Asset URL.</p></body></html>';
        }
    }

    # ─── Public HTTPS proxy (port 8443, self-signed) ──────────────────────
    # Active only when tls_enabled=true in runtime.json. When disabled we
    # still listen (cheap) but return 421 so HTTP stays the canonical path.
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate     /etc/waf/ssl/cert.pem;
        ssl_certificate_key /etc/waf/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:5m;
        ssl_session_timeout 10m;

        set $waf_blocked "0";
        set $waf_rule    "-";

        client_max_body_size 2m;

        # Short-circuit when operator hasn't enabled TLS via /system UI.
        rewrite_by_lua_block {
            if ngx.shared.waf_config:get("tls_enabled") ~= 1 then
                ngx.status = 421
                ngx.header.content_type = "text/plain"
                ngx.say("TLS listener disabled. Enable in SOC /system page.")
                return ngx.exit(421)
            end
        }
        access_by_lua_file /usr/local/openresty/nginx/lua/waf.lua;
        log_by_lua_file    /usr/local/openresty/nginx/lua/logger.lua;

        location / {
            set_by_lua_block $upstream_target {
                return ngx.shared.waf_config:get("upstream") or ""
            }

            if ($upstream_target = "") {
                return 503;
            }

            proxy_pass $upstream_target;
            proxy_http_version 1.1;
            proxy_set_header Host              $proxy_host;
            proxy_set_header X-Forwarded-For   $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-WAF-Protected   "securisphere";
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    30s;
        }

        error_page 503 = @notconfigured_tls;
        location @notconfigured_tls {
            default_type text/html;
            return 503 '<html><body style="font-family:monospace;background:#0a0a0a;color:#eab308;padding:40px"><h2>SecuriSphere WAF (TLS)</h2><p>No upstream configured.</p></body></html>';
        }
    }
}
