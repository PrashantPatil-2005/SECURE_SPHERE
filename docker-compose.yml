services:
  redis:
    image: redis:7.2-alpine
    container_name: securisphere-redis
    # Port not exposed by default. Uncomment for local dev only.
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    expose:
      - "6379"
    command: ["redis-server", "--save", "60", "1", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  database:
    image: postgres:15-alpine
    container_name: securisphere-db
    # Port not exposed by default. Uncomment ONLY for local dev DB access.
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-securisphere_db}
      POSTGRES_USER: ${POSTGRES_USER:-securisphere_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securisphere_user} -d ${POSTGRES_DB:-securisphere_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api-server:
    build:
      context: ./backend/targets/api-server
      dockerfile: Dockerfile
    container_name: securisphere-api
    ports:
      - "${API_SERVER_PORT:-5000}:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      ALLOW_PLAINTEXT_LOGIN: 1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - api-logs:/var/log/securisphere
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    build:
      context: ./backend/targets/auth-service
      dockerfile: Dockerfile
    container_name: securisphere-auth
    ports:
      - "${AUTH_SERVICE_PORT:-5001}:5001"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      ALLOW_PLAINTEXT_LOGIN: 1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5001/auth/status" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    volumes:
      - auth-logs:/var/log/securisphere
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  network-monitor:
    build:
      context: ./backend/monitors/network
      dockerfile: Dockerfile
    container_name: securisphere-netmon
    cap_add:
      - NET_RAW
      - NET_ADMIN
    network_mode: "service:api-server"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      MONITOR_INTERFACE: eth0
    depends_on:
      redis:
        condition: service_healthy
      api-server:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api-monitor:
    build:
      context: ./backend/monitors/api
      dockerfile: Dockerfile
    container_name: securisphere-apimon
    ports:
      - "5050:5050"
    volumes:
      - ./samples/pcap:/app/samples/pcap
      - api-logs:/var/log/securisphere
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      TARGET_API: http://api-server:5000
      TOPOLOGY_URL: http://topology-collector:5080
    depends_on:
      redis:
        condition: service_healthy
      api-server:
        condition: service_healthy
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5050/monitor/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  auth-monitor:
    build:
      context: ./backend/monitors/auth
      dockerfile: Dockerfile
    container_name: securisphere-authmon
    ports:
      - "5060:5060"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      TOPOLOGY_URL: http://topology-collector:5080
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5060/monitor/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - auth-logs:/var/log/securisphere
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    container_name: securisphere-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      FLASK_ENV: ${FLASK_ENV:-development}
      POSTGRES_HOST: database
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-securisphere_db}
      POSTGRES_USER: ${POSTGRES_USER:-securisphere_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required - generate with openssl rand -hex 32}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:4000}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-200/minute}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-10/minute}
      RATE_LIMIT_ATTACK: ${RATE_LIMIT_ATTACK:-5/hour}
      ALLOW_LOCALHOST_UPSTREAM: ${ALLOW_LOCALHOST_UPSTREAM:-0}
      ALLOW_PLAINTEXT_LOGIN: 1
      ADMIN_BOOTSTRAP_USER: ${ADMIN_BOOTSTRAP_USER:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      SECURISPHERE_API_URL: http://api-server:5000
      SECURISPHERE_AUTH_URL: http://auth-service:5001
      SECURISPHERE_BACKEND_URL: http://localhost:8000
      SECURISPHERE_WEBAPP_URL: http://web-app:80
      SECURISPHERE_ENGINE_URL: http://correlation-engine:5070
      SECURISPHERE_AUTHMON_URL: http://auth-monitor:5060
      WAF_CONFIG_DIR: /etc/waf/conf.d
      WAF_ADMIN_URL: http://waf-proxy:8081
      WAF_PUBLIC_URL: http://localhost:8088
      WAF_PUBLIC_TLS_URL: https://localhost:8443
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
      topology-collector:
        condition: service_healthy
    volumes:
      - waf-config:/etc/waf/conf.d
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securisphere-dashboard
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  correlation-engine:
    build:
      context: ./backend/engine
      dockerfile: correlation/Dockerfile
    container_name: securisphere-correlator
    ports:
      - "5070:5070"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      CORRELATION_WINDOW: ${CORRELATION_WINDOW:-900}
      RISK_DECAY_RATE: ${RISK_DECAY_RATE:-5}
      RISK_DECAY_INTERVAL: ${RISK_DECAY_INTERVAL:-60}
      POSTGRES_HOST: database
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-securisphere_db}
      POSTGRES_USER: ${POSTGRES_USER:-securisphere_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      HF_MODEL: ${HF_MODEL:-Qwen/Qwen2.5-72B-Instruct}
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
      topology-collector:
        condition: service_healthy
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5070/engine/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  topology-collector:
    build:
      context: ./backend/topology
      dockerfile: Dockerfile
    container_name: securisphere-topology
    ports:
      - "5080:5080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      TOPOLOGY_REFRESH_INTERVAL: 10
      COMPOSE_PROJECT_NAME: securisphere
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - securisphere-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  attack-simulator:
    build:
      context: ./backend/simulation
      dockerfile: Dockerfile
    container_name: securisphere-attacker
    networks:
      - securisphere-network
    depends_on:
      api-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      backend:
        condition: service_healthy
      correlation-engine:
        condition: service_healthy
    profiles:
      - attack
    environment:
      API_URL: http://api-server:5000
      AUTH_URL: http://auth-service:5001
      BACKEND_URL: http://backend:8000
      ENGINE_URL: http://correlation-engine:5070
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web-app:
    build:
      context: ./backend/targets/web-app
      dockerfile: Dockerfile
    container_name: securisphere-webapp
    hostname: web-app
    networks:
      - securisphere-network
    ports:
      - "8080:80"
    depends_on:
      - api-server
      - auth-service
    restart: unless-stopped

  waf-proxy:
    build:
      context: ./waf-proxy
      dockerfile: Dockerfile
    container_name: securisphere-wafproxy
    hostname: waf-proxy
    ports:
      - "${WAF_PROXY_PORT:-8088}:8080"
      - "${WAF_PROXY_TLS_PORT:-8443}:8443"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    volumes:
      - waf-config:/etc/waf/conf.d
      - waf-ssl:/etc/waf/ssl
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - securisphere-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  proxy-monitor:
    build:
      context: ./backend/monitors/proxy
      dockerfile: Dockerfile
    container_name: securisphere-proxymon
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_healthy
      waf-proxy:
        condition: service_started
    networks:
      - securisphere-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  browser-monitor:
    build:
      context: ./backend/monitors/browser
      dockerfile: Dockerfile
    container_name: securisphere-browsermon
    ports:
      - "5090:5090"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      BROWSER_EVENTS_CHANNEL: security_events
      BROWSER_MONITOR_PORT: 5090
      POSTGRES_HOST: database
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-securisphere_db}
      POSTGRES_USER: ${POSTGRES_USER:-securisphere_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TOPOLOGY_URL: http://topology-collector:5080
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    networks:
      - securisphere-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5090/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  securisphere-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  redis-data:
  postgres-data:
  api-logs:
  auth-logs:
  waf-config:
  waf-ssl:
