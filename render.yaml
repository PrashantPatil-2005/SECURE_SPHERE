services:
  - type: redis
    name: securisphere-redis
    ipAllowList: []
    plan: free

  - type: web
    name: securisphere-backend
    env: python
    plan: starter
    rootDir: backend/api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --timeout 120 --access-logfile - --error-logfile - -b 0.0.0.0:$PORT app:app
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: GUNICORN_BOOT
        value: "1"
      - key: REDIS_HOST
        fromService:
          type: redis
          name: securisphere-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: securisphere-redis
          property: port
      - key: POSTGRES_HOST
        fromDatabase:
          name: securisphere-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: securisphere-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: securisphere-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: securisphere-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: securisphere-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_HOURS
        value: "1"
      - key: CORS_ORIGINS
        # Set to your real frontend origin in the Render dashboard
        sync: false
      - key: ADMIN_BOOTSTRAP_USER
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: securisphere-dashboard
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false   # Set per-environment in dashboard

databases:
  - name: securisphere-db
    databaseName: securisphere_db
    user: securisphere_user
    plan: starter
