name: multi_layer_browser_to_db
description: Browser-layer SQLi followed by network-layer DB exfil — same service identity
settle_timeout: 12
expected_chain: [reconnaissance, exploitation, exfiltration]
events:
  - event_type: directory_enumeration
    severity: low
    source_layer: browser-agent
    source_service_name: customer-portal
    source_ip: 198.51.100.13
    delay_after: 1.0

  - event_type: sql_injection_attempt
    severity: high
    source_layer: browser-agent
    source_service_name: customer-portal
    source_ip: 198.51.100.13
    delay_after: 1.5

  - event_type: data_exfiltration
    severity: critical
    source_layer: network
    source_service_name: customer-portal
    source_entity: { ip: 198.51.100.13 }
    destination_service: database
    delay_after: 0.5
